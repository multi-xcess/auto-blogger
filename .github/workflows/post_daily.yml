name: Continuous Blogger Automation

on:
  schedule:
    - cron: '*/15 * * * *'  # Runs every 15 minutes, 24/7
  workflow_dispatch:        # Keep this for manual testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Bot
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
        run: python bot.py
